<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Напарник • Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .teal-glow { box-shadow: 0 0 15px rgba(20, 184, 166, 0.3); }
        .progress-bar { transition: width 0.4s ease; }
        .david-bg { background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-teal-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-user-tie text-white text-xl"></i>
            </div>
            <div>
                <div class="font-semibold text-lg">AI Напарник</div>
                <div class="text-xs text-slate-400">teal edition • 2026</div>
            </div>
        </div>
    </div>

    <div class="px-4 pt-6">
        <div class="max-w-md mx-auto">
            <div class="text-2xl font-semibold mb-2">Доброе утро, Давид.</div>
            <div class="bg-slate-800 rounded-3xl p-5 teal-glow">
                <div class="flex justify-between mb-2">
                    <div>Главная цель</div>
                    <div class="text-teal-400 font-semibold">68%</div>
                </div>
                <div class="h-3 bg-slate-700 rounded-full">
                    <div class="h-3 bg-teal-500 rounded-full" style="width: 68%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="px-4 py-4 max-w-md mx-auto">
        <div class="font-semibold mb-3">Цели</div>
        <div class="bg-slate-800 rounded-3xl p-4">
            <div class="flex justify-between">
                <div>Закончить проект</div>
                <div class="text-teal-400">68%</div>
            </div>
        </div>
    </div>
</body>
</html>
